<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wahyu Tirta Wardana | Portofolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-900">
    <nav
      class="bg-white/80 backdrop-blur-md border-b border-slate-200 sticky top-0 z-50"
    >
      <div
        class="max-w-5xl mx-auto px-6 py-4 flex justify-between items-center"
      >
        <span class="font-bold text-2xl tracking-tighter text-blue-600"
          >WTW.</span
        >
        <div
          class="hidden md:flex space-x-8 font-medium text-sm text-slate-600"
        >
          <a href="#home" class="hover:text-blue-600 transition italic">Home</a>
          <a href="#story" class="hover:text-blue-600 transition italic"
            >Story</a
          >
          <a href="#projects" class="hover:text-blue-600 transition italic"
            >Projects</a
          >
          <a href="#contact" class="hover:text-blue-600 transition italic"
            >Contact</a
          >
        </div>
        <a
          href="#contact"
          class="bg-blue-600 text-white px-6 py-2 rounded-full text-sm font-bold hover:bg-blue-700 transition uppercase tracking-wider"
          >Kontak</a
        >
      </div>
    </nav>

    <main class="max-w-5xl mx-auto px-6">
      {% block content %}{% endblock %}
    </main>

    <footer class="bg-white border-t border-slate-200 py-12 mt-20">
      <div
        class="max-w-5xl mx-auto px-6 text-center text-slate-500 text-sm italic"
      >
        © 2026 Wahyu Tirta Wardana. Built with Django & Tailwind CSS.
      </div>
    </footer>
  </body>
</html>
