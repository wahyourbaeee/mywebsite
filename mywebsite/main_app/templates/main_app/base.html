<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wahyu Tirta Wardana | Portofolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-900 scroll-smooth">
    <nav
      class="bg-white/80 backdrop-blur-md border-b border-slate-200 sticky top-0 z-50"
    >
      <div
        class="max-w-5xl mx-auto px-6 py-4 flex justify-between items-center"
      >
        <span class="font-bold text-2xl tracking-tighter text-blue-600"
          >WTW.</span
        >
        <div class="hidden md:flex space-x-8 font-medium">
          <a href="#home" class="hover:text-blue-600 transition">Home</a>
          <a href="#about" class="hover:text-blue-600 transition">Tentang</a>
          <a href="#experience" class="hover:text-blue-600 transition"
            >Pengalaman</a
          >
          <a href="#" class="hover:text-blue-600 transition">Blog</a>
        </div>
        <a
          href="mailto:email-lo@gmail.com"
          class="bg-blue-600 text-white px-5 py-2 rounded-full text-sm font-semibold hover:bg-blue-700 transition"
          >Kontak</a
        >
      </div>
    </nav>

    {% block content %} {% endblock %}

    <footer class="bg-white border-t border-slate-200 py-12">
      <div class="max-w-5xl mx-auto px-6 text-center">
        <p class="text-slate-500 text-sm">
          © 2026 Wahyu Tirta Wardana. Built with Django & Tailwind.
        </p>
      </div>
    </footer>
  </body>
</html>
